format = """
$username\
$directory\
$git_branch\
$git_status\
$python\
$character"""

# Sets user-defined palette
# Palettes must be defined _after_ this line
palette = "catppuccin_macchiato"

[username]
style_user = 'fg:mauve bold'
style_root = 'fg:red bold'
format = '[$user]($style)'
disabled = false
show_always = true

[directory]
style = "fg:blue bold"
format = " in [$path]($style)"
truncation_length = 8
truncation_symbol = "…/"

[directory.substitutions]
"Documents" = "Documents 󰈙"
"Downloads" = "Downloads "
"Pictures" = "Pictures "

[python]
symbol = " "
style = "fg:yellow"
format = ' \[[${symbol}${pyenv_prefix}(${version})(\($virtualenv\))]($style)\]'

[git_branch]
symbol = ""
style = "fg:green bold"
format = ' on[ $symbol $branch ]($style)'

[git_status]
style = "fg:maroon"
format = "[$all_status$ahead_behind]($style)"
conflicted = "=${count}"
ahead = "⇡${count}"
behind = "⇣${count}"
diverged = "⇕⇡${ahead_count}⇣${behind_count}"
untracked = "?${count}"
stashed = "\\$${count}"
modified = "!${count}"
staged = "+${count}"
renamed = "»${count}"
deleted = "✘${count}"

[character]
success_symbol = "[❯](lavender)"
error_symbol = "[❯](red)"

[palettes.catppuccin_macchiato]
mauve = "#c6a0f6"
red = "#ed8796"
maroon = "#ee99a0"
yellow = "#eed49f"
green = "#a6da95"
blue = "#8aadf4"
lavender = "#b7bdf8"

[palettes.nord]
mauve = "#B48EAD"    
red = "#BF616A"      
maroon = "#D08770"   
yellow = "#EBCB8B"   
green = "#A3BE8C"    
blue = "#81A1C1"     
lavender = "#8FBCBB" 
